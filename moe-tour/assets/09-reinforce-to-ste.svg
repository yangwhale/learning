<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="Google Sans, Segoe UI, sans-serif">
  <rect width="860" height="500" fill="#FAFAFA" rx="8"/>
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">从 REINFORCE 到 p_i·e_i：门控梯度的第一性原理推导</text>
  <text x="430" y="48" text-anchor="middle" font-size="11" fill="#5F6368">苏剑林核心贡献：用概率框架推导 MoE 门控，证明 Softmax + 不 Re-Norm 是理论最优</text>

  <!-- Step 1 -->
  <rect x="30" y="65" width="380" height="90" rx="8" fill="white" stroke="#1A73E8" stroke-width="2"/>
  <circle cx="50" cy="80" r="12" fill="#1A73E8"/>
  <text x="50" y="84" text-anchor="middle" font-size="10" font-weight="700" fill="white">1</text>
  <text x="70" y="84" font-size="10" font-weight="600" fill="#1A73E8">理想路由 (k=1)</text>
  <text x="45" y="104" font-size="9" fill="#3C4043">理想目标: 找 Loss 最小的 expert</text>
  <text x="45" y="120" font-size="9" fill="#3C4043">argmax ρ(x) = argmin[l(e_1(x)), ..., l(e_n(x))]</text>
  <text x="45" y="138" font-size="9" fill="#5F6368">→ 构造目标分布 q_i = exp(-l(e_i)/τ) / Z</text>

  <!-- Step 2 -->
  <rect x="450" y="65" width="380" height="90" rx="8" fill="white" stroke="#1A73E8" stroke-width="2"/>
  <circle cx="470" cy="80" r="12" fill="#1A73E8"/>
  <text x="470" y="84" text-anchor="middle" font-size="10" font-weight="700" fill="white">2</text>
  <text x="490" y="84" font-size="10" font-weight="600" fill="#1A73E8">KL 散度最小化</text>
  <text x="465" y="104" font-size="9" fill="#3C4043">min KL(p || q) = Σ p_i · log(p_i/q_i)</text>
  <text x="465" y="120" font-size="9" fill="#3C4043">展开: = Σ p_i · l(e_i)/τ + Σ p_i · log(p_i) + log Z</text>
  <text x="465" y="138" font-size="9" fill="#1A73E8" font-weight="600">有效 Loss: L = Σ p_i · l(e_i)</text>

  <!-- Arrow down -->
  <line x1="430" y1="160" x2="430" y2="180" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arr9)"/>

  <!-- Step 3 -->
  <rect x="30" y="185" width="380" height="105" rx="8" fill="white" stroke="#F9AB00" stroke-width="2"/>
  <circle cx="50" cy="200" r="12" fill="#F9AB00"/>
  <text x="50" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="white">3</text>
  <text x="70" y="204" font-size="10" font-weight="600" fill="#E37400">REINFORCE 梯度</text>
  <text x="45" y="224" font-size="9" fill="#3C4043">∇L = E_{i~p}[∇log(p_i) · l(e_i)]</text>
  <text x="45" y="242" font-size="9" fill="#EA4335" font-weight="600">问题: 方差极大！</text>
  <text x="45" y="258" font-size="9" fill="#EA4335">→ 需要大量采样才能收敛</text>
  <text x="45" y="276" font-size="9" fill="#EA4335">→ 实际训练 MoE 根本不可行</text>

  <!-- Step 4 -->
  <rect x="450" y="185" width="380" height="105" rx="8" fill="white" stroke="#F9AB00" stroke-width="2"/>
  <circle cx="470" cy="200" r="12" fill="#F9AB00"/>
  <text x="470" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="white">4</text>
  <text x="490" y="204" font-size="10" font-weight="600" fill="#E37400">Baseline 减方差 + Taylor</text>
  <text x="465" y="224" font-size="9" fill="#3C4043">减 baseline: ∇ Σ p_i · (l(e_i) - b)</text>
  <text x="465" y="242" font-size="9" fill="#3C4043">令 b = l(e_j*) (j* = argmax p)</text>
  <text x="465" y="260" font-size="9" fill="#3C4043">Taylor: log(p_i) ≈ p_i - 1</text>
  <text x="465" y="278" font-size="9" fill="#1A73E8" font-weight="600">→ L ≈ Σ p_i · l(e_i) + Stop Gradient 项</text>

  <!-- Arrow down -->
  <line x1="430" y1="295" x2="430" y2="315" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arr9)"/>

  <!-- Step 5: THE KEY TRICK -->
  <rect x="140" y="320" width="580" height="80" rx="8" fill="white" stroke="#34A853" stroke-width="3"/>
  <circle cx="160" cy="335" r="12" fill="#34A853"/>
  <text x="160" y="339" text-anchor="middle" font-size="10" font-weight="700" fill="white">5</text>
  <text x="180" y="339" font-size="11" font-weight="700" fill="#137333">关键一步：改变 Expert 定义消除 Stop Gradient</text>
  <text x="155" y="360" font-size="9" fill="#3C4043">原始: y = e_{j*}(x), 门控 ρ 只参与路由选择</text>
  <text x="155" y="378" font-size="10" fill="#137333" font-weight="700">改为: y = p_{j*} · e_{j*}(x), 门控 ρ 同时做路由 + 缩放</text>
  <text x="155" y="394" font-size="9" fill="#137333">梯度自然流过 p_i → 无需 REINFORCE → 无需 Stop Gradient → STE 也不需要！</text>

  <!-- Arrow down -->
  <line x1="430" y1="405" x2="430" y2="425" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arr9)"/>

  <!-- Conclusion -->
  <rect x="30" y="430" width="800" height="60" rx="8" fill="#E8F0FE" stroke="#1A73E8" stroke-width="2"/>
  <text x="430" y="455" text-anchor="middle" font-size="12" font-weight="700" fill="#1A73E8">推论：门控应该归一化（p 是分布），但不应该 Re-Norm（会破坏 p_i·e_i 的概率语义）</text>
  <text x="430" y="476" text-anchor="middle" font-size="10" fill="#5F6368">Re-Norm 使 k=1 时 p=1 → 门控梯度为零 → 无法学习路由 | Softmax 是满足此推导的最自然选择</text>

  <defs>
    <marker id="arr9" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5F6368"/>
    </marker>
  </defs>
</svg>
