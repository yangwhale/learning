<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" font-family="Google Sans, Segoe UI, sans-serif">
  <defs>
    <marker id="arr5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5F6368"/>
    </marker>
  </defs>

  <rect width="860" height="380" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">b 的自由度分解：均值控预算，偏差控均衡</text>
  <text x="430" y="48" text-anchor="middle" font-size="11" fill="#5F6368">b 的冗余自由度 = 全体 b_i 加同一常数不改变排序 → 拿来做预算控制</text>

  <!-- The b vector decomposition -->
  <rect x="40" y="70" width="780" height="80" rx="8" fill="#E8F0FE" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="430" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#1A73E8">偏置向量 b 的分解</text>
  <text x="430" y="120" text-anchor="middle" font-size="12" fill="#1967D2">b = (b - b̄) + b̄</text>
  <text x="240" y="140" text-anchor="middle" font-size="10" fill="#5F6368">零均值分量 (控均衡)</text>
  <text x="600" y="140" text-anchor="middle" font-size="10" fill="#5F6368">均值标量 (控预算)</text>

  <!-- Left: Balance component -->
  <rect x="40" y="170" width="380" height="190" rx="8" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
  <text x="230" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="#137333">零均值分量：负载均衡</text>

  <text x="60" y="220" font-size="10" fill="#3C4043">更新规则（去均值后）：</text>

  <rect x="60" y="232" width="340" height="30" rx="4" fill="white" stroke="#34A853" stroke-width="1"/>
  <text x="230" y="252" text-anchor="middle" font-size="11" fill="#137333" font-weight="600">b ← b - γ[sign(F-Q) - mean(sign(F-Q))]</text>

  <text x="60" y="282" font-size="10" fill="#5F6368">去均值保证 b̄ = 0 恒成立</text>
  <text x="60" y="300" font-size="10" fill="#5F6368">只改变各 b_i 的相对大小</text>
  <text x="60" y="318" font-size="10" fill="#5F6368">不影响 argwhere(ρ+b > 0) 的阈值</text>

  <rect x="60" y="330" width="340" height="20" rx="4" fill="#34A853" opacity="0.1"/>
  <text x="230" y="345" text-anchor="middle" font-size="10" font-weight="600" fill="#137333">效果：让 F ≈ Q（各 expert 负载均匀）</text>

  <!-- Right: Budget component -->
  <rect x="440" y="170" width="380" height="190" rx="8" fill="#FEF7E0" stroke="#F9AB00" stroke-width="1.5"/>
  <text x="630" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="#E37400">均值分量：预算控制</text>

  <text x="460" y="220" font-size="10" fill="#3C4043">更新规则（控制均值）：</text>

  <rect x="460" y="232" width="340" height="30" rx="4" fill="white" stroke="#F9AB00" stroke-width="1"/>
  <text x="630" y="252" text-anchor="middle" font-size="11" fill="#B06000" font-weight="600">b̄ ← b̄ - γ · sign(|F̃| - k)</text>

  <text x="460" y="282" font-size="10" fill="#5F6368">|F̃| = 平均每 token 激活的 expert 数</text>
  <text x="460" y="300" font-size="10" fill="#5F6368">|F̃| > k → 减小 b̄ → 阈值升高 → 激活更少</text>
  <text x="460" y="318" font-size="10" fill="#5F6368">|F̃| &lt; k → 增大 b̄ → 阈值降低 → 激活更多</text>

  <rect x="460" y="330" width="340" height="20" rx="4" fill="#F9AB00" opacity="0.1"/>
  <text x="630" y="345" text-anchor="middle" font-size="10" font-weight="600" fill="#E37400">效果：让平均 expert 数 ≈ k</text>

  <!-- Bottom: Combined formula -->
  <rect x="130" y="365" width="600" height="6" rx="3" fill="#1A73E8" opacity="0.2"/>
</svg>
