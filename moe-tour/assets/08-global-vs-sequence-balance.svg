<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" font-family="Google Sans, Segoe UI, sans-serif">
  <rect width="860" height="440" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">全局均衡 vs 序列级均衡：两种均衡粒度的差异</text>
  <text x="430" y="48" text-anchor="middle" font-size="11" fill="#5F6368">全局均衡看 batch 整体 → 序列内可能极端不均；序列均衡看每个序列 → 可能损伤效果</text>

  <!-- Left: Global -->
  <rect x="30" y="65" width="390" height="280" rx="8" fill="white" stroke="#1A73E8" stroke-width="2"/>
  <rect x="30" y="65" width="390" height="28" rx="8" fill="#1A73E8"/>
  <rect x="30" y="80" width="390" height="13" fill="#1A73E8"/>
  <text x="225" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="white">全局均衡 (QB / Loss-Free / Aux Loss)</text>

  <text x="50" y="112" font-size="10" font-weight="600" fill="#1A73E8">均衡范围</text>
  <text x="50" y="130" font-size="9" fill="#3C4043">统计整个 batch (所有序列) 的 expert 分布</text>
  <text x="50" y="148" font-size="9" fill="#3C4043">β ∈ R^n 全局共享，所有 token 用同一个偏置</text>

  <text x="50" y="172" font-size="10" font-weight="600" fill="#137333">优势</text>
  <text x="50" y="190" font-size="9" fill="#5F6368">- 统计量充足（batch_size × seq_len 个样本）</text>
  <text x="50" y="206" font-size="9" fill="#5F6368">- 对模型效果影响最小</text>
  <text x="50" y="222" font-size="9" fill="#5F6368">- 所有 Loss-Free 方案天然支持</text>

  <text x="50" y="246" font-size="10" font-weight="600" fill="#EA4335">问题</text>
  <!-- Visual: sequences with imbalance -->
  <rect x="50" y="260" width="350" height="68" rx="4" fill="#FCE8E6"/>
  <text x="60" y="278" font-size="9" fill="#3C4043">Seq 1: [Expert 0: 80%] [Expert 1: 5%] [Others: 15%]</text>
  <text x="60" y="296" font-size="9" fill="#3C4043">Seq 2: [Expert 0: 2%] [Expert 1: 90%] [Others: 8%]</text>
  <text x="60" y="314" font-size="9" fill="#C5221F" font-weight="600">全局看均衡 → 单序列极端不均 → 该序列"坍缩"为小模型</text>

  <!-- Right: Sequence-level -->
  <rect x="440" y="65" width="390" height="280" rx="8" fill="white" stroke="#34A853" stroke-width="2"/>
  <rect x="440" y="65" width="390" height="28" rx="8" fill="#34A853"/>
  <rect x="440" y="80" width="390" height="13" fill="#34A853"/>
  <text x="635" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="white">序列级均衡 (MQB)</text>

  <text x="460" y="112" font-size="10" font-weight="600" fill="#137333">均衡范围</text>
  <text x="460" y="130" font-size="9" fill="#3C4043">每个序列内部各 expert 分布均匀</text>
  <text x="460" y="148" font-size="9" fill="#3C4043">β_i ∈ R^n 每个位置不同，滑动窗口内最优</text>

  <text x="460" y="172" font-size="10" font-weight="600" fill="#137333">优势</text>
  <text x="460" y="190" font-size="9" fill="#5F6368">- 防止单序列坍缩</text>
  <text x="460" y="206" font-size="9" fill="#5F6368">- 每个序列都能用到所有 expert 的知识</text>
  <text x="460" y="222" font-size="9" fill="#5F6368">- 因果性保持（只看过去 token）</text>

  <text x="460" y="246" font-size="10" font-weight="600" fill="#EA4335">代价</text>
  <rect x="460" y="260" width="350" height="68" rx="4" fill="#FCE8E6"/>
  <text x="470" y="278" font-size="9" fill="#3C4043">λ=1.0: Loss +0.06（严重掉点！）</text>
  <text x="470" y="296" font-size="9" fill="#3C4043">λ=0.3: Loss 基本无损，均衡显著改善</text>
  <text x="470" y="314" font-size="9" fill="#C5221F" font-weight="600">过强的序列均衡 = 强制路由 → 削弱 Router 语义选择</text>

  <!-- Bottom: Best practice -->
  <rect x="30" y="358" width="800" height="72" rx="8" fill="#E8F0FE" stroke="#1A73E8" stroke-width="1"/>
  <text x="430" y="380" text-anchor="middle" font-size="11" font-weight="700" fill="#1A73E8">实践最佳：MQB (λ≈0.3) + QB 两阶段</text>

  <rect x="50" y="392" width="240" height="28" rx="4" fill="#34A853" opacity="0.2" stroke="#34A853"/>
  <text x="170" y="410" text-anchor="middle" font-size="9" fill="#137333">阶段 1: MQB 削峰 (λ=0.3)</text>

  <text x="305" y="410" font-size="12" fill="#5F6368">→</text>

  <rect x="320" y="392" width="240" height="28" rx="4" fill="#1A73E8" opacity="0.2" stroke="#1A73E8"/>
  <text x="440" y="410" text-anchor="middle" font-size="9" fill="#1967D2">阶段 2: QB 全局均衡</text>

  <text x="575" y="410" font-size="12" fill="#5F6368">→</text>

  <rect x="590" y="392" width="220" height="28" rx="4" fill="#F9AB00" opacity="0.2" stroke="#F9AB00"/>
  <text x="700" y="410" text-anchor="middle" font-size="9" fill="#E37400">结果: 序列不坍缩 + 全局均衡</text>
</svg>
