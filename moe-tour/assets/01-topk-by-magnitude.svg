<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Google Sans, Segoe UI, sans-serif">
  <rect width="800" height="420" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">按模长选 Top-K：最小化逼近误差</text>
  <text x="400" y="50" text-anchor="middle" font-size="11" fill="#5F6368">正交假设下，丢弃模长最小的 n-k 个向量 → 保留模长最大的 k 个</text>

  <!-- 2D vector diagram - all vectors -->
  <text x="200" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#5F6368">所有 n=6 个 Expert 向量</text>

  <!-- Origin -->
  <circle cx="200" cy="260" r="3" fill="#202124"/>

  <!-- Long vectors (to keep, k=3) -->
  <line x1="200" y1="260" x2="320" y2="140" stroke="#1A73E8" stroke-width="2.5"/>
  <text x="330" y="138" font-size="10" font-weight="600" fill="#1A73E8">v_1 (大)</text>

  <line x1="200" y1="260" x2="350" y2="230" stroke="#1A73E8" stroke-width="2.5"/>
  <text x="360" y="228" font-size="10" font-weight="600" fill="#1A73E8">v_3 (大)</text>

  <line x1="200" y1="260" x2="180" y2="120" stroke="#1A73E8" stroke-width="2.5"/>
  <text x="165" y="115" font-size="10" font-weight="600" fill="#1A73E8">v_5 (大)</text>

  <!-- Short vectors (to drop) -->
  <line x1="200" y1="260" x2="230" y2="235" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="240" y="230" font-size="9" fill="#EA4335">v_2 (小)</text>

  <line x1="200" y1="260" x2="175" y2="245" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="147" y="243" font-size="9" fill="#EA4335">v_4 (小)</text>

  <line x1="200" y1="260" x2="215" y2="250" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="225" y="255" font-size="9" fill="#EA4335">v_6 (小)</text>

  <!-- Legend -->
  <line x1="80" y1="310" x2="110" y2="310" stroke="#1A73E8" stroke-width="2.5"/>
  <text x="115" y="314" font-size="10" fill="#1A73E8">保留 (Top-k)</text>
  <line x1="80" y1="330" x2="110" y2="330" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="115" y="334" font-size="10" fill="#EA4335">丢弃 (模长小)</text>

  <!-- Arrow separator -->
  <text x="405" y="200" text-anchor="middle" font-size="32" fill="#34A853">→</text>
  <text x="405" y="225" text-anchor="middle" font-size="10" fill="#34A853" font-weight="600">MoE</text>
  <text x="405" y="238" text-anchor="middle" font-size="10" fill="#34A853">稀疏化</text>

  <!-- Right: only top-k vectors -->
  <text x="600" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#5F6368">MoE: 只保留 k=3 个</text>

  <!-- Origin -->
  <circle cx="600" cy="260" r="3" fill="#202124"/>

  <!-- Only the long vectors -->
  <line x1="600" y1="260" x2="720" y2="140" stroke="#1A73E8" stroke-width="2.5"/>
  <text x="730" y="138" font-size="10" font-weight="600" fill="#1A73E8">v_1</text>

  <line x1="600" y1="260" x2="750" y2="230" stroke="#1A73E8" stroke-width="2.5"/>
  <text x="760" y="228" font-size="10" font-weight="600" fill="#1A73E8">v_3</text>

  <line x1="600" y1="260" x2="580" y2="120" stroke="#1A73E8" stroke-width="2.5"/>
  <text x="565" y="115" font-size="10" font-weight="600" fill="#1A73E8">v_5</text>

  <!-- Computation saving -->
  <rect x="490" y="300" width="220" height="50" rx="6" fill="#E6F4EA" stroke="#34A853" stroke-width="1"/>
  <text x="600" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#137333">计算量 = k/n = 3/6 = 50%</text>
  <text x="600" y="338" text-anchor="middle" font-size="9" fill="#137333">逼近误差 = 丢弃的短向量之和的模长</text>

  <!-- Key insight box -->
  <rect x="100" y="365" width="600" height="40" rx="6" fill="#FEF7E0" stroke="#F9AB00" stroke-width="1"/>
  <text x="400" y="383" text-anchor="middle" font-size="11" fill="#E37400" font-weight="600">几何直觉：模长大 = 贡献大 = 不可丢弃</text>
  <text x="400" y="397" text-anchor="middle" font-size="10" fill="#B06000">高维空间中随机向量趋近正交 → 正交假设合理</text>
</svg>
