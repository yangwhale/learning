<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" font-family="Google Sans, Segoe UI, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5F6368"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1A73E8"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34A853"/>
    </marker>
  </defs>

  <rect width="860" height="500" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">STE 推导：从直觉 Loss 到 GShard Aux Loss</text>
  <text x="430" y="48" text-anchor="middle" font-size="11" fill="#5F6368">核心技巧：F 不可导 → 用可导的 P 在反向传播中替代</text>

  <!-- Step 1: The intuitive loss -->
  <rect x="40" y="70" width="360" height="90" rx="8" fill="#E8F0FE" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="220" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#1A73E8">第一步：直觉 Loss</text>
  <text x="220" y="118" text-anchor="middle" font-size="11" fill="#1967D2">L_aux = (1/2) ‖F - Q‖²</text>
  <text x="220" y="138" text-anchor="middle" font-size="10" fill="#5F6368">F = 实际负载分布 (不可导!)</text>
  <text x="220" y="152" text-anchor="middle" font-size="10" fill="#5F6368">Q = 均匀分布 (1/n, ..., 1/n)</text>

  <!-- Problem callout -->
  <rect x="450" y="70" width="370" height="90" rx="8" fill="#FCE8E6" stroke="#EA4335" stroke-width="1.5"/>
  <text x="635" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#C5221F">问题：F 由 argtop_k 产生</text>
  <text x="635" y="118" text-anchor="middle" font-size="11" fill="#A50E0E">f_i = 1/k (选中) 或 0 (未选中)</text>
  <text x="635" y="138" text-anchor="middle" font-size="10" fill="#A50E0E">argtop_k 是离散操作 → 梯度为 0</text>
  <text x="635" y="152" text-anchor="middle" font-size="10" fill="#A50E0E">无法直接反向传播!</text>

  <!-- Arrow down -->
  <line x1="430" y1="165" x2="430" y2="195" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="440" y="185" font-size="10" fill="#5F6368" font-weight="600">STE 技巧</text>

  <!-- Step 2: STE substitution -->
  <rect x="130" y="200" width="600" height="100" rx="8" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
  <text x="430" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#137333">第二步：STE 替换</text>

  <!-- Forward path -->
  <rect x="150" y="240" width="250" height="25" rx="4" fill="#34A853" opacity="0.15"/>
  <text x="275" y="257" text-anchor="middle" font-size="10" fill="#137333">前向传播：用 F（真实值）</text>

  <!-- Backward path -->
  <rect x="420" y="240" width="290" height="25" rx="4" fill="#1A73E8" opacity="0.15"/>
  <text x="565" y="257" text-anchor="middle" font-size="10" fill="#1967D2">反向传播：用 P（光滑近似）</text>

  <text x="430" y="288" text-anchor="middle" font-size="11" fill="#137333" font-weight="600">L = (1/2) ‖ P + sg[F - P] - Q ‖²</text>

  <!-- Arrow down -->
  <line x1="430" y1="305" x2="430" y2="335" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="440" y="325" font-size="10" fill="#5F6368" font-weight="600">求梯度</text>

  <!-- Step 3: Gradient equivalence -->
  <rect x="130" y="340" width="600" height="80" rx="8" fill="#FEF7E0" stroke="#F9AB00" stroke-width="1.5"/>
  <text x="430" y="365" text-anchor="middle" font-size="12" font-weight="700" fill="#E37400">第三步：梯度等价</text>

  <text x="430" y="390" text-anchor="middle" font-size="11" fill="#B06000">∇L = ∇ Σ (F_i - 1/n) P_i = ∇ Σ F_i P_i</text>
  <text x="430" y="410" text-anchor="middle" font-size="10" fill="#B06000">（利用 Σ ∇P_i = ∇1 = 0，即 P 是概率分布）</text>

  <!-- Arrow down -->
  <line x1="430" y1="425" x2="430" y2="445" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Final result -->
  <rect x="230" y="450" width="400" height="40" rx="8" fill="#1A73E8" opacity="0.1" stroke="#1A73E8" stroke-width="2"/>
  <text x="430" y="468" text-anchor="middle" font-size="14" font-weight="700" fill="#1A73E8">GShard Aux Loss: L_aux = F · P = Σ F_i P_i</text>
  <text x="430" y="485" text-anchor="middle" font-size="10" fill="#1967D2">只有梯度意义，不是真正的 Loss（最小值不在 F=Q 处取到）</text>
</svg>
