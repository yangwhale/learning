<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" font-family="Google Sans, Segoe UI, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5F6368"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34A853"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#EA4335"/>
    </marker>
  </defs>

  <rect width="860" height="480" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">Router = 模长预测器：MoE 的完整计算流程</text>
  <text x="430" y="48" text-anchor="middle" font-size="11" fill="#5F6368">先算模长 ρ（便宜），选 Top-k，再算方向 e（贵）→ 输出 ρ_i · e_i 之和</text>

  <!-- Step 1: Input -->
  <rect x="30" y="80" width="100" height="50" rx="6" fill="#E8F0FE" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="80" y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#1A73E8">输入 x</text>
  <text x="80" y="118" text-anchor="middle" font-size="9" fill="#1967D2">d 维向量</text>

  <!-- Arrow to Router -->
  <line x1="130" y1="105" x2="165" y2="105" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Router (cheap) -->
  <rect x="170" y="70" width="160" height="70" rx="8" fill="#FEF7E0" stroke="#F9AB00" stroke-width="1.5"/>
  <text x="250" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#E37400">Router</text>
  <text x="250" y="108" text-anchor="middle" font-size="10" fill="#B06000">ρ = h(x · W_R)</text>
  <text x="250" y="124" text-anchor="middle" font-size="9" fill="#B06000">O(d·n) 很便宜!</text>

  <!-- Arrow to Top-k -->
  <line x1="330" y1="105" x2="365" y2="105" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Top-k selection -->
  <rect x="370" y="70" width="120" height="70" rx="8" fill="#FCE8E6" stroke="#EA4335" stroke-width="1.5"/>
  <text x="430" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#C5221F">Top-K</text>
  <text x="430" y="108" text-anchor="middle" font-size="10" fill="#A50E0E">argtop_k(ρ)</text>
  <text x="430" y="124" text-anchor="middle" font-size="9" fill="#A50E0E">按模长排序</text>

  <!-- Arrow down to selected experts -->
  <line x1="430" y1="140" x2="430" y2="175" stroke="#34A853" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="465" y="163" font-size="9" fill="#34A853" font-weight="600">只选 k 个</text>

  <!-- Arrow from top-k to dropped -->
  <line x1="490" y1="115" x2="545" y2="115" stroke="#EA4335" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>

  <!-- Dropped experts -->
  <rect x="550" y="80" width="130" height="50" rx="6" fill="#FCE8E6" opacity="0.5" stroke="#EA4335" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="615" y="102" text-anchor="middle" font-size="10" fill="#EA4335">n-k 个不计算</text>
  <text x="615" y="118" text-anchor="middle" font-size="9" fill="#EA4335">省 (n-k)/n 计算量</text>

  <!-- Step 4: Selected Expert computation -->
  <rect x="310" y="180" width="240" height="100" rx="8" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
  <text x="430" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#137333">被选中的 k 个 Expert</text>
  <text x="430" y="225" text-anchor="middle" font-size="10" fill="#137333">计算方向: e_i = f(x · W_i^A) · W_i^B / ‖...‖</text>
  <text x="430" y="245" text-anchor="middle" font-size="10" fill="#137333">组合: y = Σ ρ_i · e_i</text>
  <text x="430" y="265" text-anchor="middle" font-size="9" fill="#137333">O(k·d·c) ← 这是主要计算量</text>

  <!-- Arrow to output -->
  <line x1="430" y1="280" x2="430" y2="310" stroke="#5F6368" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <rect x="370" y="315" width="120" height="40" rx="6" fill="#1A73E8" opacity="0.15" stroke="#1A73E8" stroke-width="1.5"/>
  <text x="430" y="340" text-anchor="middle" font-size="12" font-weight="600" fill="#1A73E8">输出 y</text>

  <!-- Comparison table -->
  <text x="430" y="390" text-anchor="middle" font-size="13" font-weight="700" fill="#202124">传统 MoE vs 几何视角 MoE</text>

  <!-- Table -->
  <rect x="100" y="400" width="660" height="25" rx="0" fill="#E8EAED"/>
  <text x="220" y="417" text-anchor="middle" font-size="10" font-weight="600" fill="#5F6368">维度</text>
  <text x="420" y="417" text-anchor="middle" font-size="10" font-weight="600" fill="#5F6368">传统 MoE</text>
  <text x="620" y="417" text-anchor="middle" font-size="10" font-weight="600" fill="#5F6368">几何视角 MoE (苏剑林)</text>

  <line x1="100" y1="425" x2="760" y2="425" stroke="#DADCE0" stroke-width="1"/>

  <text x="220" y="442" text-anchor="middle" font-size="10" fill="#3C4043">ρ_i 的含义</text>
  <text x="420" y="442" text-anchor="middle" font-size="10" fill="#3C4043">抽象打分 (概率)</text>
  <text x="620" y="442" text-anchor="middle" font-size="10" font-weight="600" fill="#137333">向量模长预测</text>

  <text x="220" y="460" text-anchor="middle" font-size="10" fill="#3C4043">Expert 归一化</text>
  <text x="420" y="460" text-anchor="middle" font-size="10" fill="#3C4043">无</text>
  <text x="620" y="460" text-anchor="middle" font-size="10" font-weight="600" fill="#137333">有 (e_i = v_i / ‖v_i‖)</text>

  <text x="220" y="478" text-anchor="middle" font-size="10" fill="#3C4043">激活函数</text>
  <text x="420" y="478" text-anchor="middle" font-size="10" fill="#3C4043">必须 Softmax</text>
  <text x="620" y="478" text-anchor="middle" font-size="10" font-weight="600" fill="#137333">Sigmoid / ReLU 均可</text>

  <!-- Vertical separators -->
  <line x1="320" y1="400" x2="320" y2="480" stroke="#DADCE0" stroke-width="1"/>
  <line x1="520" y1="400" x2="520" y2="480" stroke="#DADCE0" stroke-width="1"/>
</svg>
