<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" font-family="Google Sans, Segoe UI, sans-serif">
  <rect width="860" height="480" fill="#FAFAFA" rx="8"/>
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">TPU 上的门控选择：从理论到芯片实现</text>
  <text x="430" y="48" text-anchor="middle" font-size="11" fill="#5F6368">不同门控激活函数在 TPU 硬件上的行为差异与工程决策</text>

  <!-- Row 1: Three gate functions on TPU -->
  <text x="30" y="75" font-size="11" font-weight="700" fill="#202124">各门控在 TPU 上的硬件特性</text>

  <!-- Softmax on TPU -->
  <rect x="30" y="85" width="260" height="160" rx="8" fill="white" stroke="#1A73E8" stroke-width="1.5"/>
  <rect x="30" y="85" width="260" height="22" rx="8" fill="#1A73E8" opacity="0.15"/>
  <rect x="30" y="95" width="260" height="12" fill="#1A73E8" opacity="0.15"/>
  <text x="160" y="101" text-anchor="middle" font-size="10" font-weight="600" fill="#1A73E8">Softmax on TPU</text>
  <text x="45" y="125" font-size="9" fill="#3C4043">exp() + reduce_sum + div</text>
  <text x="45" y="143" font-size="9" fill="#137333">XLA 自动融合为单 kernel</text>
  <text x="45" y="161" font-size="9" fill="#3C4043">数值稳定: max 减法 + log-sum-exp</text>
  <text x="45" y="179" font-size="9" fill="#5F6368">BF16 精度足够 (GShard 验证)</text>
  <text x="45" y="197" font-size="9" fill="#1A73E8" font-weight="600">MaxText 默认 · ALModel 默认</text>
  <text x="45" y="215" font-size="9" fill="#5F6368">TPU Expert Parallelism 原生兼容</text>
  <text x="45" y="231" font-size="8" fill="#137333">GShard → Switch → GLaM → MaxText</text>

  <!-- Sigmoid on TPU -->
  <rect x="300" y="85" width="260" height="160" rx="8" fill="white" stroke="#34A853" stroke-width="1.5"/>
  <rect x="300" y="85" width="260" height="22" rx="8" fill="#34A853" opacity="0.15"/>
  <rect x="300" y="95" width="260" height="12" fill="#34A853" opacity="0.15"/>
  <text x="430" y="101" text-anchor="middle" font-size="10" font-weight="600" fill="#137333">Sigmoid on TPU</text>
  <text x="315" y="125" font-size="9" fill="#3C4043">σ(x) = 1/(1+exp(-x))</text>
  <text x="315" y="143" font-size="9" fill="#137333">每 expert 独立 → 天然并行</text>
  <text x="315" y="161" font-size="9" fill="#EA4335" font-weight="600">BF16 精度不够!</text>
  <text x="315" y="179" font-size="9" fill="#EA4335">DeepSeek R1 TPU 推理教训:</text>
  <text x="315" y="197" font-size="9" fill="#EA4335">PR #1891 修复, MMLU 67→80</text>
  <text x="315" y="215" font-size="9" fill="#34A853" font-weight="600">Loss-Free 均衡的最佳搭档</text>
  <text x="315" y="231" font-size="8" fill="#5F6368">DeepSeek V3/V4 · QB 兼容</text>

  <!-- SiTU/Sqrt-Softplus on TPU -->
  <rect x="570" y="85" width="260" height="160" rx="8" fill="white" stroke="#F9AB00" stroke-width="1.5"/>
  <rect x="570" y="85" width="260" height="22" rx="8" fill="#F9AB00" opacity="0.15"/>
  <rect x="570" y="95" width="260" height="12" fill="#F9AB00" opacity="0.15"/>
  <text x="700" y="101" text-anchor="middle" font-size="10" font-weight="600" fill="#E37400">SiTU / Sqrt-Softplus on TPU</text>
  <text x="585" y="125" font-size="9" fill="#3C4043">SiTU: σ(x)·tanh(x) (K3)</text>
  <text x="585" y="143" font-size="9" fill="#3C4043">Sqrt-Softplus: √ln(1+exp(x)) (V4)</text>
  <text x="585" y="161" font-size="9" fill="#137333">有界输出 → MXFP4 量化友好</text>
  <text x="585" y="179" font-size="9" fill="#137333">非竞争性 → 各 expert 独立打分</text>
  <text x="585" y="197" font-size="9" fill="#5F6368">XLA: 3 op fusion (σ+tanh+mul)</text>
  <text x="585" y="215" font-size="9" fill="#E37400" font-weight="600">下一代门控的候选方案</text>
  <text x="585" y="231" font-size="8" fill="#5F6368">K3 2.8T · V4 1.6T 已验证</text>

  <!-- Row 2: TPU EP + Gate interaction -->
  <rect x="30" y="260" width="800" height="205" rx="8" fill="white" stroke="#5F6368" stroke-width="1"/>
  <text x="430" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#202124">门控选择如何影响 TPU Expert Parallelism (EP)</text>

  <!-- Left: Normalized gates -->
  <rect x="50" y="300" width="350" height="60" rx="6" fill="#E8F0FE" stroke="#1A73E8"/>
  <text x="225" y="320" text-anchor="middle" font-size="10" font-weight="600" fill="#1A73E8">归一化门控 (Softmax)</text>
  <text x="225" y="340" text-anchor="middle" font-size="9" fill="#3C4043">Top-K 选完 → ρ 之和 &lt; 1 → 输出自带"确信度"缩放</text>
  <text x="225" y="355" text-anchor="middle" font-size="8" fill="#5F6368">EP All-to-All: 只传 Top-K token + ρ 值, 通信量 = batch × k × (dim + 1)</text>

  <!-- Right: Non-normalized gates -->
  <rect x="460" y="300" width="350" height="60" rx="6" fill="#E6F4EA" stroke="#34A853"/>
  <text x="635" y="320" text-anchor="middle" font-size="10" font-weight="600" fill="#137333">非归一化门控 (Sigmoid/SiTU)</text>
  <text x="635" y="340" text-anchor="middle" font-size="9" fill="#3C4043">每 expert 独立评分 → 需额外 bias 控制负载均衡</text>
  <text x="635" y="355" text-anchor="middle" font-size="8" fill="#5F6368">EP All-to-All: 同样传 Top-K, QB/MQB 的 bias 也需跨 EP 同步</text>

  <!-- Bottom comparison -->
  <rect x="50" y="375" width="350" height="75" rx="6" fill="#FEF7E0"/>
  <text x="60" y="395" font-size="10" font-weight="600" fill="#E37400">TPU Static-Shape EP 兼容性</text>
  <text x="60" y="415" font-size="9" fill="#3C4043">关键: 不论哪种门控, Static-Shape 都需要</text>
  <text x="60" y="430" font-size="9" fill="#3C4043">QB 保证每 expert 恰好 batch×k/n 个 token</text>
  <text x="60" y="445" font-size="9" fill="#137333" font-weight="600">门控函数 ≠ 均衡算法, 两者正交!</text>

  <rect x="460" y="375" width="350" height="75" rx="6" fill="#FEF7E0"/>
  <text x="470" y="395" font-size="10" font-weight="600" fill="#E37400">TPU SparseCore 加速</text>
  <text x="470" y="415" font-size="9" fill="#3C4043">门控计算 (Softmax/Sigmoid/SiTU):</text>
  <text x="470" y="430" font-size="9" fill="#3C4043">n 路打分 + Top-K + bias 修正</text>
  <text x="470" y="445" font-size="9" fill="#137333" font-weight="600">v7 SparseCore: 路由 + 均衡 全 offload</text>
</svg>
