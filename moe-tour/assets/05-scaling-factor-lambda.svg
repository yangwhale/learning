<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="Google Sans, Segoe UI, sans-serif">
  <defs>
    <marker id="arr5b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5F6368"/>
    </marker>
  </defs>

  <rect width="860" height="420" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">缩放因子 λ：为什么需要它？</text>
  <text x="430" y="48" text-anchor="middle" font-size="11" fill="#5F6368">初始化时 Shared Expert 输出量级 ≫ 单个 Routed Expert 输出 → λ 补偿差异</text>

  <!-- Problem statement -->
  <rect x="40" y="65" width="780" height="60" rx="8" fill="#FCE8E6" stroke="#EA4335" stroke-width="1.5"/>
  <text x="430" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#C5221F">问题：初始化不均衡</text>
  <text x="430" y="108" text-anchor="middle" font-size="11" fill="#A50E0E">Shared Expert 独占 4× 更大维度，输出量级远大于 top-k 个 Routed Expert 的加权和</text>

  <!-- Left: Without lambda -->
  <rect x="40" y="140" width="380" height="250" rx="8" fill="white" stroke="#EA4335" stroke-width="1.5"/>
  <text x="230" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#C5221F">无 λ：y = E_s(x) + Σ g_i · E_i(x)</text>

  <!-- Shared expert bar (tall) -->
  <rect x="80" y="195" width="80" height="140" rx="4" fill="#34A853" opacity="0.7"/>
  <text x="120" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#137333">Shared</text>
  <text x="120" y="365" text-anchor="middle" font-size="9" fill="#137333">dim=2048</text>
  <text x="120" y="215" text-anchor="middle" font-size="11" fill="white" font-weight="600">||E_s|| ≈ 大</text>

  <!-- Routed expert bars (short) -->
  <rect x="190" y="295" width="35" height="40" rx="3" fill="#1A73E8" opacity="0.7"/>
  <text x="207" y="350" text-anchor="middle" font-size="8" fill="#1A73E8">E1</text>
  <rect x="235" y="300" width="35" height="35" rx="3" fill="#1A73E8" opacity="0.7"/>
  <text x="252" y="350" text-anchor="middle" font-size="8" fill="#1A73E8">E2</text>
  <rect x="280" y="305" width="35" height="30" rx="3" fill="#1A73E8" opacity="0.5"/>
  <text x="297" y="350" text-anchor="middle" font-size="8" fill="#9AA0A6">...</text>
  <text x="252" y="365" text-anchor="middle" font-size="9" fill="#1A73E8">dim=512</text>

  <text x="230" y="390" text-anchor="middle" font-size="10" fill="#C5221F" font-weight="600">Routed 贡献被 Shared 淹没</text>

  <!-- Right: With lambda -->
  <rect x="440" y="140" width="380" height="250" rx="8" fill="white" stroke="#34A853" stroke-width="1.5"/>
  <text x="630" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#137333">有 λ：y = E_s(x) + λ · Σ g_i · E_i(x)</text>

  <!-- Shared expert bar -->
  <rect x="480" y="235" width="80" height="100" rx="4" fill="#34A853" opacity="0.7"/>
  <text x="520" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#137333">Shared</text>
  <text x="520" y="275" text-anchor="middle" font-size="11" fill="white" font-weight="600">||E_s||</text>

  <!-- Routed expert bars (scaled up by lambda) -->
  <rect x="590" y="240" width="35" height="95" rx="3" fill="#1A73E8" opacity="0.7"/>
  <text x="607" y="350" text-anchor="middle" font-size="8" fill="#1A73E8">λ·E1</text>
  <rect x="635" y="245" width="35" height="90" rx="3" fill="#1A73E8" opacity="0.7"/>
  <text x="652" y="350" text-anchor="middle" font-size="8" fill="#1A73E8">λ·E2</text>
  <rect x="680" y="250" width="35" height="85" rx="3" fill="#1A73E8" opacity="0.5"/>
  <text x="697" y="350" text-anchor="middle" font-size="8" fill="#1A73E8">...</text>

  <text x="630" y="390" text-anchor="middle" font-size="10" fill="#137333" font-weight="600">λ 放大 Routed 输出，两组贡献量级匹配</text>

  <!-- Bottom: Lambda derivation -->
  <rect x="40" y="395" width="780" height="20" rx="4" fill="#E8F0FE"/>
  <text x="430" y="410" text-anchor="middle" font-size="10" fill="#1A73E8">DeepSeek V2: λ=16 (n=160, k=6, dim=1536 vs shared_dim=2048) · V3: λ≈2.83→实取2.5 (n=256, k=8, dim=2048) · 用蒙特卡洛模拟估算</text>
</svg>
